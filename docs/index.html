<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oct 7th Otef — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      max-width: 100vw;
    }
    body {
      margin: 0;
      min-height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }
    .main {
      flex: 1 0 auto;
      padding: 0;
      width: 100%;
      max-width: min(1440px, 100vw);
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #fff;
      overflow-x: hidden;
    }
    .embed-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .embed-inner {
      flex-shrink: 0;
      width: 1400px;
      height: 1200px;
      transform-origin: top center;
    }
    .embed-inner iframe {
      display: block;
      width: 1400px;
      height: 1200px;
      border: none;
    }
    @media (max-width: 768px) {
      .main { padding: 0; }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="embed-wrapper">
      <div class="embed-inner" id="embed-inner">
        <iframe
          src="https://public.tableau.com/views/Oct-7th_Otef/Dashboard2?:display_count=y&:origin=viz_share_link&:showVizHome=no#1"
          allowfullscreen
          title="Oct 7th Otef Dashboard"
        ></iframe>
      </div>
    </div>
  </main>
  <script>
    (function() {
      var DASH_W = 1400, DASH_H = 1200;
      var wrapper = document.querySelector('.embed-wrapper');
      var inner = document.getElementById('embed-inner');
      function fit() {
        var w = wrapper.clientWidth;
        var scale = w / DASH_W;
        inner.style.transform = 'scale(' + scale + ')';
        wrapper.style.height = (DASH_H * scale) + 'px';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
