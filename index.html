<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oct 7th Otef — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }
    .main {
      flex: 1;
      min-height: 0;
      padding: 0;
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #fff;
    }
    .embed-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .embed-inner {
      flex-shrink: 0;
      width: 1200px;
      height: 1400px;
      transform-origin: top center;
    }
    .embed-inner iframe {
      display: block;
      width: 1200px;
      height: 1400px;
      border: none;
    }
    @media (max-width: 768px) {
      .main { padding: 0; }
    }
    .footer {
      flex-shrink: 0;
      padding: 1rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #666;
    }
    .footer a {
      color: #0066cc;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="main">
    <div class="embed-wrapper">
      <div class="embed-inner" id="embed-inner">
        <iframe
          src="https://public.tableau.com/views/Oct-7th_Otef/Dashboard2?:display_count=y&:origin=viz_share_link&:showVizHome=no#1"
          allowfullscreen
          title="Oct 7th Otef Dashboard"
        ></iframe>
      </div>
    </div>
  </main>
  <script>
    (function() {
      var DASH_W = 1200, DASH_H = 1400;
      var wrapper = document.querySelector('.embed-wrapper');
      var inner = document.getElementById('embed-inner');
      function fit() {
        var w = wrapper.clientWidth;
        var h = wrapper.clientHeight;
        var scale = Math.min(w / DASH_W, h / DASH_H);
        inner.style.transform = 'scale(' + scale + ')';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
  <footer class="footer">
    <a href="https://public.tableau.com/views/Oct-7th_Otef/Dashboard2?:display_count=y&:origin=viz_share_link&:showVizHome=no#1" target="_blank" rel="noopener">Open in Tableau Public</a>
  </footer>
</body>
</html>
