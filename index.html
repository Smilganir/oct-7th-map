<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oct 7th Otef — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #f0f0f0;
    }
    .embed-container {
      width: 100%;
      max-width: 1400px;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1400 / 1200;
      background: #fff;
    }
    .embed-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1400px;
      height: 1200px;
      border: none;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="embed-container" id="embed-container">
      <iframe
        src="https://public.tableau.com/views/Oct-7th_Otef/Dashboard2?:display_count=y&:origin=viz_share_link&:showVizHome=no&:embed=y#1"
        allowfullscreen
        scrolling="no"
        title="Oct 7th Otef Dashboard"
      ></iframe>
    </div>
  </div>
  <script>
    (function () {
      var DASH_W = 1400;
      var container = document.getElementById('embed-container');
      var iframe = container.querySelector('iframe');
      function fit() {
        var scale = container.clientWidth / DASH_W;
        iframe.style.transform = 'scale(' + scale + ')';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
