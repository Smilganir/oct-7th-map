<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/1691bd_3e33b5453dd147b5ade67f2914a4588c%7Emv2.png/v1/fill/w_192%2Ch_192%2Clg_1%2Cusm_0.66_1.00_0.01/1691bd_3e33b5453dd147b5ade67f2914a4588c%7Emv2.png">
  <title>Oct-7th-Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #f0f0f0;
      overflow: hidden;
    }
    .embed-container {
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    .embed-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1400px;
      height: 1200px;
      border: none;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="embed-container" id="embed-container">
      <iframe
        src="https://public.tableau.com/views/Oct-7th_Otef/Dashboard2?:display_count=y&:origin=viz_share_link&:showVizHome=no&:embed=y#1"
        allowfullscreen
        scrolling="no"
        title="Oct 7th Otef Dashboard"
      ></iframe>
    </div>
  </div>
  <script>
    (function () {
      var DASH_W = 1400, DASH_H = 1200;
      var viewport = document.querySelector('.viewport');
      var container = document.getElementById('embed-container');
      var iframe = container.querySelector('iframe');
      function fit() {
        var vw = viewport.clientWidth;
        var cw = Math.min(vw, DASH_W);
        var scale = cw / DASH_W;
        var ch = DASH_H * scale;
        container.style.width = cw + 'px';
        container.style.height = ch + 'px';
        iframe.style.transform = 'scale(' + scale + ')';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
